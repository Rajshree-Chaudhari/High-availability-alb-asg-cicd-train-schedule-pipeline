# .github/dependabot.yml

version: 2

updates:

  - package-ecosystem: "npm"
    directory: "/"              # or "/backend" / "/src" if requirements.txt/pyproject.toml are inside a subfolder
    target-branch: "main"       # always open PRs against main
    schedule:
      interval: "weekly"
      day: "monday"
      time: "11:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5

    groups:
      # 1 PR for all patch updates (e.g. 1.2.3 → 1.2.4)
      patch-updates:
        update-types:
          - "patch"

      # 1 PR for all minor updates (e.g. 1.2.4 → 1.3.0)
      minor-updates:
        update-types:
          - "minor"

    labels:
      - "dependencies"
      - "npm"

    commit-message:
      prefix: "chore"
      include: "scope"
